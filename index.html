<script>
const grid = document.getElementById('grid');
const editor = document.getElementById('editor');
const player = document.getElementById('player');
const editorTitle = document.getElementById('editorTitle');
const startTS = document.getElementById('start');
const endTS = document.getElementById('end');
const sizeLimitEl = document.getElementById('sizeLimit');

// Handle video/audio synchronization
player.addEventListener('play', () => {
  document.querySelectorAll('#audioTracks audio').forEach(audio => {
    audio.currentTime = player.currentTime;
    audio.play();
  });
});

player.addEventListener('pause', () => {
  document.querySelectorAll('#audioTracks audio').forEach(audio => {
    audio.pause();
  });
});

player.addEventListener('seeking', () => {
  document.querySelectorAll('#audioTracks audio').forEach(audio => {
    audio.currentTime = player.currentTime;
  });
});
// const progressBar = document.getElementById('progressBar');
const jobMsg = document.getElementById('jobMsg');
const downloadButton = document.getElementById('downloadLink');
const deleteButton = document.getElementById('deleteButton');


// const volumesDiv = document.getElementById('volumesDiv');

// we dont know how many audio tracks there will be 
// fetch them !!todo
// we now know, still fix it tho

let volumes = []; // store references to range inputs

let current = null; // current clip item

function fmtSec(second){
  return (Math.round(second*10)/10).toFixed(1); }

// human-friendly relative time formatter
function timeAgo(ts){
  if (!ts) return '??/??/????';
  // ts (this) meme is dead 💔💔
  const then = new Date(ts * 1000);
  const now = new Date();
  const diff = Math.floor((now - then) / 1000); // seconds
  if (diff < 0) return 'just now';
  if (diff < 60) return diff === 1 ? '1 second ago' : `${diff} seconds ago`;
  const mins = Math.floor(diff / 60);
  if (mins < 60) return mins === 1 ? '1 minute ago' : `${mins} minutes ago`;
  const hours = Math.floor(mins / 60);
  if (hours < 24) return hours === 1 ? '1 hour ago' : `${hours} hours ago`;
  const days = Math.floor(hours / 24);
  if (days === 1) return 'yesterday';
  if (days < 7) return `${days} days ago`;
  const weeks = Math.floor(days / 7);
  if (weeks < 5) return weeks === 1 ? '1 week ago' : `${weeks} weeks ago`;
  // older than ~1 month -> show dd/mm/yyyy | anti american
  const d = then;
  const dd = String(d.getDate()).padStart(2, '0');
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const yyyy = d.getFullYear();
  return `${dd}/${mm}/${yyyy}`;
}

function formatSize(bytes) {
  if (bytes == null) return null;

  const units = ["B", "KB", "MB", "GB", "TB"];
  let i = 0;
  let size = bytes;

  while (size >= 1024 && i < units.length - 1) {
    size /= 1024;
    i++;
  }

  return Math.ceil(size) + " " + units[i];
}

async function fetchJSON(url, opts){
  const response = await fetch(url, opts);
  if (!response.ok) throw new Error(await response.text());
  return response.json();
}

async function loadClips() {
grid.innerHTML = '';
const clips = await fetchJSON('/clips');

for (const item of clips) {
  const card = document.createElement('div');
  card.className = 'card';

  // Use placeholder image initially
  const img = document.createElement('img');
  img.className = 'thumb';
  img.alt = 'thumbnail';
  img.src = '/loading.jpg'; // lightweight placeholder
  img.dataset.uuid = item.uuid;

  const meta = document.createElement('div');
  meta.className = 'meta';
  meta.innerHTML = `
    <div class="title">${item.edited_title || item.file}</div>
    <div class="sub">
      <h4>${item.size_bytes != null ? formatSize(item.size_bytes) : '??'}</h4>
      <h4>${timeAgo(item.creation_time)}</h4>
    </div>
  `;

  card.appendChild(img);
  card.appendChild(meta);
  card.addEventListener('click', () => openClip(item));
  grid.appendChild(card);

  observeImage(img); // Hook image into lazy loader
}
}

const observer = new IntersectionObserver((entries, observer) => {
  for (const entry of entries) {
    if (entry.isIntersecting) {
      const img = entry.target;
      const uuid = img.dataset.uuid;

      fetch(`/clips/${uuid}/thumb`)
        .then(resp => resp.ok ? resp.blob() : Promise.reject())
        .then(blob => {
          const url = URL.createObjectURL(blob);
          img.src = url;
        })
        .catch(() => {
          img.src = '/loading.jpg';
        });

      observer.unobserve(img); // Only load once
    }
  }
}, {
  rootMargin: '200px', // start loading slightly before visible
  threshold: 0.1
});

function observeImage(img) {
  observer.observe(img);
}

async function openClip(item) {
  current = item;
  editorTitle.textContent = item.edited_title || item.file;

  // Clear any existing audio elements
  const audioTracks = document.getElementById('audioTracks');
  audioTracks.innerHTML = '';
  
  // Setup volume controls
  const container = document.getElementById('volumesDiv');
  container.innerHTML = '';

  // Create volume controls and audio elements for each track
  const audio_tracks = item.audio_tracks || 0;
  volSlidersArray = Array.from({length: audio_tracks}, (_, i) => 1.0);

  for (let i = 0; i < audio_tracks; i++) {
    // Create audio element for this track
    const audio = document.createElement('audio');
    audio.id = `audio-track-${i}`;
    audio.src = `/clips/${item.uuid}/audio/${i}`; // You'll need to add this endpoint
    audio.preload = 'auto';
    audioTracks.appendChild(audio);

    // Create control container
    const controlDiv = document.createElement('div');
    controlDiv.className = 'audio-track-control';
    
    // Track number
    const trackNum = document.createElement('div');
    trackNum.className = 'track-number';
    trackNum.textContent = i + 1;
    
    // Volume slider
    const range = document.createElement('input');
    range.type = 'range';
    range.min = 0;
    range.max = 1.5;
    range.step = 0.05;
    range.value = shouldMuteTrack(i) ? 0 : 1.0;
    range.id = `range-${i}`;
    
    // If this is track 0 and it should be muted, initialize audio volume to 0
    if (shouldMuteTrack(i)) {
      audio.volume = 0;
    }

    // Volume value display
    const output = document.createElement('div');
    output.className = 'volume-value';
    output.textContent = '1.0';

    // Handle volume changes with boost support
    range.addEventListener('input', () => {
      const value = parseFloat(range.value);
      output.textContent = value.toFixed(2);
      // For HTML5 Audio, we need to handle volume boost manually since volume is capped at 1
      // if (value <= 1) {
      //   audio.volume = value;
      //   audio.preservesPitch = true; // Prevent pitch changes
      // } else {
      audio.volume = 1;
      // Use Web Audio API for boosting beyond 100%
      if (!audio.audioContext) {
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const source = audioContext.createMediaElementSource(audio);
        const gainNode = audioContext.createGain();
        source.connect(gainNode);
        gainNode.connect(audioContext.destination);
        audio.audioContext = audioContext;
        audio.gainNode = gainNode;
      }
      audio.gainNode.gain.value = value;
      // }
    });

    controlDiv.appendChild(trackNum);
    controlDiv.appendChild(range);
    controlDiv.appendChild(output);
    container.appendChild(controlDiv);
  }



  editor.classList.add('show');
  jobMsg.textContent = '';
  downloadButton.style.display = 'none'; // hide download button
  // bar.style.width = '0%';
  player.src = `/clips/${item.uuid}/play`;
  player.load();

  const clip = await fetchJSON(`/clips/${item.uuid}`, { method: 'GET' });

  startTS.value = clip.edited_start || 0;
  endTS.value = clip.edited_stop ? fmtSec(clip.edited_stop) : (clip.duration ? fmtSec(clip.duration) : '0');

};

function collectValues() {
      const newValues = [];

      volSlidersArray.forEach((_, index) => {
        const slider = document.getElementById(`range-${index}`);
        const value = parseFloat(slider.value);
        newValues.push(value);
      });
      // console.log("Collected slider values:", newValues);
      return newValues;
}

document.getElementById('setStart').onclick = async ()=>{
  startTS.value = fmtSec(player.currentTime || 0);

  await fetchJSON(`/clips/${current.uuid}`,
  {
    method:'PATCH',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify
    ({
      edited_start: startTS.value
    })
  });
};

document.getElementById('setEnd').onclick = async ()=>{
  // const d = player.duration || 0;
  const t = player.currentTime || 0;
  endTS.value = fmtSec(Math.max(t, 0.1));

  await fetchJSON(`/clips/${current.uuid}`,
  {
    method:'PATCH',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify
    ({
      edited_stop: endTS.value
    })
  });
};

deleteButton.onclick = async () => {
  if (!current) return;
  const confirmed = confirm(`Are you sure you want to delete the clip "${current.edited_title || current.file}" from disk?`); // TODO optional file delete
  if (!confirmed) return;

  try {
    await fetchJSON(`/clips/${current.uuid}`, { method: 'DELETE' });
    closeEditor();
    loadClips().catch(() => {});
  } catch (error) {
    alert('Failed to delete clip: ' + (error.message || error)); // TODO make it a notif, dont take up my whole screen
    console.error('Error deleting clip:', error);
  }
};


async function startExport(){
  if (!current) return;
  const start = parseFloat(startTS.value || '0');
  let end = parseFloat(endTS.value || '0');
  
  const d = player.duration || 0;
  if (!end || end <= start) end = d || (start + 1);


  const volumes = collectValues();
  console.log('Volumes going to API: ', volumes);


  const payload = {
    start, end, 
    volumes,
    size_limit_mb: parseFloat(sizeLimitEl.value || '50')
  };


  const res = await fetchJSON(`/clips/${current.uuid}/export`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });
  jobMsg.textContent = 'Job Queued!';
  downloadButton.style.display = 'inline';
}


document.getElementById('exportBtn').onclick = ()=>{ 
  startExport().catch(e=> alert(e.message||e)); 
};

downloadButton.onclick = async (e) => {
  e.preventDefault();
  console.log('download clicked');
  console.log('current:', current);

  if (!current) {
    console.log('No current clip selected.');
    return;
  }

  const url = `/clips/${current.uuid}/export`;

  try {
    const response = await fetch(url, { method: 'HEAD' }); // check if it exists
    if (response.ok) {
      // file exists, go download
      const tempLink = document.createElement('a'); //make a temp link otherwise it loops the onClick
      tempLink.href = url;
      // we dont set the download name clientside bc the server already names the file w the edited title
      document.body.appendChild(tempLink);
      tempLink.click();
      document.body.removeChild(tempLink);
    } else {
      console.warn('File not ready:', response.status);
      downloadButton.textContent = 'not ready >:(';
      setTimeout(() => {
        downloadButton.textContent = 'Download';
      }, 500);
    }
  } catch (err) {
    console.error('Error checking file:', err);
    downloadButton.textContent = 'Error :(\nCheck console';
    setTimeout(() => {
      downloadButton.textContent = 'Download';
    }, 500);
  }
};



document.getElementById('statusBtn').onclick = ()=> loadClips().catch(()=>{});


// editor title change
editorTitle.addEventListener('input', async ()=>{
  console.log('title changed: ', editorTitle.textContent);
  await fetchJSON(`/clips/${current.uuid}`,
  {
    method:'PATCH',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify
    ({
      edited_title: editorTitle.textContent
    })
  });
});


async function closeEditor(){
  editor.classList.remove('show');
  player.pause();
  current = null;
}

document.getElementById('closeBtn').onclick = ()=>{
  closeEditor();
};

window.onclick = function(event) {
  if (event.target == editor) {
    closeEditor();
  }
};


// Settings Management
const settingsModal = document.getElementById('settingsModal');
const settingsBtn = document.getElementById('settingsBtn');
const closeSettingsBtn = document.getElementById('closeSettingsBtn');
const muteTrack0Setting = document.getElementById('muteTrack0Setting');
const resetMetadataBtn = document.getElementById('resetMetadataBtn');

// Load settings from localStorage
const loadSettings = () => {
  muteTrack0Setting.checked = localStorage.getItem('muteTrack0') === 'true';
};

// Save settings to localStorage
muteTrack0Setting.addEventListener('change', () => {
  localStorage.setItem('muteTrack0', muteTrack0Setting.checked);
});

// Settings modal controls
settingsBtn.addEventListener('click', () => {
  settingsModal.classList.add('show');
  loadSettings();
});

closeSettingsBtn.addEventListener('click', () => {
  settingsModal.classList.remove('show');
});

// Reset metadata button
resetMetadataBtn.addEventListener('click', async () => {
  if (confirm('This will reset and requeue all items. Continue?')) {
    try {
      await fetchJSON('/reset', { method: 'POST' });
      alert('Reset successful. Items have been requeued.');
      loadClips();
    } catch (error) {
      alert('Error resetting items: ' + error.message);
    }
  }
});

// Apply muted track setting when creating audio controls
const shouldMuteTrack = (trackIndex) => {
  return trackIndex === 0 && localStorage.getItem('muteTrack0') === 'true';
};

// init
loadClips().catch(err=>{ grid.innerHTML = '<div class="muted">Failed to load clips</div>'; console.error(err); });

// ===============================
// Global State
// ===============================
let allClips = []; // store loaded clips for navigation

// ===============================
// Load Clips + Flag Support
// ===============================
async function loadClips() {
  grid.innerHTML = '';
  const clips = await fetchJSON('/clips');
  allClips = clips; // store for navigation

  for (const item of clips) {
    const card = document.createElement('div');
    card.className = 'card';
    // if (flaggedForDeletion.has(item.uuid)) card.classList.add('flagged');

    const img = document.createElement('img');
    img.className = 'thumb';
    img.alt = 'thumbnail';
    img.src = '/loading.jpg';
    img.dataset.uuid = item.uuid;

    const meta = document.createElement('div');
    meta.className = 'meta';
    meta.innerHTML = `
      <div class="title">${item.edited_title || item.file}</div>
      <div class="sub">
        <h4>${item.size_bytes != null ? formatSize(item.size_bytes) : '??'}</h4>
        <h4>${timeAgo(item.creation_time)}</h4>
      </div>
    `;

    card.appendChild(img);
    card.appendChild(meta);

    // Left click = open editor
    card.addEventListener('click', () => openClip(item));

    // Right click = flag/unflag
    card.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      toggleFlag(item);
    });

    grid.appendChild(card);
    observeImage(img);
  }

  // updateConfirmDeleteVisibility();
}

// ===============================
// Clip Navigation (Q / E)
// ===============================
function goToClip(direction) {
  if (!current || allClips.length === 0) return;
  const idx = allClips.findIndex(c => c.uuid === current.uuid);
  if (idx === -1) return;
  const newIdx = (idx + direction + allClips.length) % allClips.length;
  openClip(allClips[newIdx]);
}

<!-- Notifications container -->
<div id="notifications" aria-live="polite"></div>

<script>
// Server-Sent Events listener for export notifications
(() => {
  if (!window.EventSource) return; // SSE unsupported

  const es = new EventSource('/events');
  const notifications = document.getElementById('notifications');

  function createNotification(uuid, filename) {
    const el = document.createElement('div');
    el.className = 'notif';

    const msg = document.createElement('div');
    msg.textContent = filename + ' is ready';

    const link = document.createElement('a');
    link.href = `/clips/${uuid}/export`;
    link.textContent = 'Download';
    link.setAttribute('role', 'button');
    link.style.marginLeft = 'auto';

    el.appendChild(msg);
    el.appendChild(link);

    // remove after 3 minutes or on click
    const timeout = setTimeout(() => { if (el.parentNode) el.parentNode.removeChild(el); }, 3 * 60 * 1000);
    link.addEventListener('click', () => { clearTimeout(timeout); if (el.parentNode) el.parentNode.removeChild(el); });

    notifications.appendChild(el);
  }

  es.addEventListener('export', (ev) => {
    try {
      const data = JSON.parse(ev.data);
      const uuid = data.uuid;
      const filename = data.filename || 'export.mp4';

      // If editor currently showing this clip, reveal the download button too
      try {
        if (window.current && window.current.uuid === uuid) {
          const downloadBtn = document.getElementById('downloadLink');
          if (downloadBtn) {
            downloadBtn.parentElement.style.display = 'inline';
            downloadBtn.href = `/clips/${uuid}/export`;
            const jobMsg = document.getElementById('jobMsg');
            if (jobMsg) jobMsg.textContent = 'Export ready!';
          }
        }
      } catch (_) {}

      // Always create a small toast notification
      createNotification(uuid, filename);
    } catch (err) {
      console.error('Invalid SSE export event', err, ev.data);
    }
  });

  // optional: handle connection errors
  es.onerror = (e) => {
    // console.warn('EventSource error', e);
  };
})();
</script>
